<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Chatbot</title>
    <!-- Google Fonts 및 Material Icons 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --chat-user-bg: #4f46e5;
            --chat-ai-bg: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 80vh;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #334155;
        }

        /* 헤더 스타일 */
        .chat-header {
            padding: 20px;
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .logo-icon {
            background-color: var(--accent-color);
            color: white;
            padding: 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* 채팅 본문 영역 */
        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: #0f172a;
        }

        /* 말풍선 스타일 */
        .message-row {
            display: flex;
            width: 100%;
            gap: 12px;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.ai {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.95rem;
            line-height: 1.6;
            word-break: break-all;
            white-space: pre-wrap;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .message-row.user .message-bubble {
            background-color: var(--chat-user-bg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message-row.ai .message-bubble {
            background-color: var(--chat-ai-bg);
            color: var(--text-main);
            border-bottom-left-radius: 2px;
            border: 1px solid #475569;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .message-row.user .avatar {
            background-color: #312e81;
            color: #c7d2fe;
            order: 2;
        }

        .message-row.ai .avatar {
            background-color: #1e1b4b;
            color: #818cf8;
        }

        /* 입력 폼 영역 */
        .chat-input-area {
            padding: 20px;
            background-color: var(--card-bg);
            border-top: 1px solid #334155;
        }

        .chat-form {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: var(--text-main);
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent-color);
        }

        .send-button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .send-button:hover {
            background-color: var(--accent-hover);
        }

        .send-button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        /* 대기 중 애니메이션 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 20px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- 헤더 -->
    <div class="chat-header">
        <div class="logo-icon">
            <span class="material-icons">smart_toy</span>
        </div>
        <div>
            <h1>Spring AI Assistant</h1>
            <p>Gemini 3.1 Flash-Lite 기반 채팅 서비스</p>
        </div>
    </div>

    <!-- 메시지 목록 -->
    <div class="chat-messages" id="chatMessages">
        <!-- 기본 안내 메시지 -->
        <div class="message-row ai">
            <div class="avatar"><span class="material-icons">smart_toy</span></div>
            <div class="message-bubble">안녕하세요! Spring AI에 대해 궁금한 점을 질문해 주세요.</div>
        </div>
    </div>

    <!-- 입력 폼 -->
    <div class="chat-input-area">
        <form class="chat-form" id="chatForm">
            <input type="text" id="userInput" class="chat-input" placeholder="메시지를 입력하세요..." required autocomplete="off">
            <button type="submit" id="sendBtn" class="send-button">
                <span>전송</span>
                <span class="material-icons">send</span>
            </button>
        </form>
    </div>
</div>

<script>
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const chatMessages = document.getElementById('chatMessages');
    const sendBtn = document.getElementById('sendBtn');

    // 메시지 화면 추가 함수
    function appendMessage(sender, text) {
        const row = document.createElement('div');
        row.className = `message-row ${sender}`;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.innerHTML = sender === 'user'
            ? '<span class="material-icons">person</span>'
            : '<span class="material-icons">smart_toy</span>';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerText = text;

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatMessages.appendChild(row);

        // 스크롤 하단 이동
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return bubble;
    }

    // 로딩 표시 추가 함수
    function appendLoading() {
        const row = document.createElement('div');
        row.className = 'message-row aiTemp';
        row.classList.add('message-row', 'ai');

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.innerHTML = '<span class="material-icons">smart_toy</span>';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerHTML = `
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        `;

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatMessages.appendChild(row);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return row;
    }

    // 전송 폼 이벤트 리스너
    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = userInput.value.trim();
        if (!message) return;

        // 1. 사용자 메시지 추가 및 입력창 비우기
        appendMessage('user', message);
        userInput.value = '';

        // 2. 입력 제한 및 로딩 표시
        userInput.disabled = true;
        sendBtn.disabled = true;
        const loadingRow = appendLoading();

        try {
            // 3. 백엔드 API 호출 (기존에 작성한 ChatController 호출)
            // @RestController 엔드포인트 URL에 쿼리 스트링으로 메시지 전달
            const url = `/api/chat?message=${encodeURIComponent(message)}`;
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error('서버 에러가 발생했습니다.');
            }

            const replyText = await response.text();

            // 4. 로딩 제거 후 AI 답변 추가
            loadingRow.remove();
            appendMessage('ai', replyText);

        } catch (error) {
            console.error(error);
            loadingRow.remove();
            appendMessage('ai', '죄송합니다. 답변을 불러오는 데 실패했습니다. 다시 시도해 주세요.');
        } finally {
            // 5. 입력 활성화
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    });
</script>
</body>
</html>
